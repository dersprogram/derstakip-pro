<script>
function getAppData(){
  return AppShell.loadAppData() || {};
}

function isGuest(){
  return AppShell.isGuestUser(getAppData());
}

function getTodayDayName(){
  return AppShell.getTodayDayName();
}

function getRequestedDay(){
  const params = new URLSearchParams(location.search);
  if(params.get("day")) return params.get("day");
  const lesson = params.get("lesson") || "";
  if(lesson.startsWith("__DAY__-")){
    return lesson.replace("__DAY__-", "");
  }
  return "";
}

function isRestrictedAccess(dayName){
  if(!isGuest()) return false;
  if(!dayName) return false;
  return dayName !== getTodayDayName();
}

function showRestrictedPrompt(){
  AppShell.showRegisterPrompt("Bu özelliğin tamamını kullanmak için kayıt olun.");
}

// Öğretmen: "9A - Matematik" → tam ad olarak gösterilir
function setLessonTitle(lesson){
  const parts = lesson.split(" - ");
  const title = document.getElementById("lessonTitle");
  if(!title) return;
  title.innerText = parts.length > 1 ? parts[0] + " - " + parts[1] : parts[0];
}

let editId = null;
let editFromList = false;
let currentDay = null;
let lastEditType = null;
let accessLocked = false;
const KEY = "app_notes";

function data(){
  return AppShell.safeJsonParse(localStorage.getItem(KEY), []) || [];
}

function saveData(dataset){
  try{
    localStorage.setItem(KEY, JSON.stringify(dataset));
  }catch(error){
    console.warn("NOTE STORAGE FAIL", error);
  }
  editId = null;
}

function showScreen(name){
  document.getElementById("lessonScreen").classList.add("hidden");
  document.getElementById("dayScreen").classList.add("hidden");
  document.getElementById("listScreen").classList.add("hidden");
  document.getElementById(name).classList.remove("hidden");
}

function applyAccessState(){
  const fields = document.querySelectorAll("#lessonScreen textarea, #lessonScreen input, #dayScreen textarea, #dayScreen input");
  const buttons = document.querySelectorAll("#lessonScreen button, #dayScreen button");
  const heads = document.querySelectorAll("#lessonScreen .card-head, #dayScreen .card-head");

  fields.forEach((field) => {
    field.disabled = accessLocked;
  });

  buttons.forEach((button) => {
    button.disabled = accessLocked;
    button.style.opacity = accessLocked ? ".55" : "1";
  });

  heads.forEach((head) => {
    head.style.opacity = accessLocked ? ".65" : "1";
  });
}

const params = new URLSearchParams(location.search);
const lesson = params.get("lesson");
const mode = params.get("mode") || (!lesson ? "list" : null);
const requestedDay = getRequestedDay();
accessLocked = isRestrictedAccess(requestedDay);

if(mode === "list"){
  showScreen("listScreen");
}else if(lesson && lesson.startsWith("__DAY__")){
  currentDay = lesson.replace("__DAY__-", "");
  showScreen("dayScreen");
  document.getElementById("dayTitle").textContent = currentDay;
}else{
  showScreen("lessonScreen");
  if(lesson){
    setLessonTitle(lesson);
  }
}

function save(type){
  if(accessLocked){
    showRestrictedPrompt();
    return;
  }

  const search = new URLSearchParams(location.search);
  const lessonKey = search.get("lesson");
  const sourceDay = search.get("day") || currentDay || "";

  let text = "";
  let date = "";

  if(type === "not") text = document.getElementById("notText").value;
  if(type === "odev") text = document.getElementById("odevText").value;

  if(type === "sinav"){
    text = document.getElementById("sinavText").value;
    date = document.getElementById("sinavDate").value;
  }

  if(type === "day") text = document.getElementById("dayText").value;
  if(!text && !date) return;

  const dataset = data() || [];
  let updatedId = editId;

  if(editId){
    const item = dataset.find((entry) => entry.id === editId);
    if(item){
      item.text = text;
      item.date = date;
    }
  }else{
    updatedId = Date.now();
    dataset.push({
      id: updatedId,
      type,
      lesson: lessonKey,
      text,
      date,
      day: new Date().toLocaleDateString("tr-TR"),
      dayName: currentDay,
      sourceDay
    });
  }

  saveData(dataset);
  render();
  renderAll();
  editFromList = false;
  editId = null;

  document.getElementById("notText").value = "";
  document.getElementById("odevText").value = "";
  document.getElementById("sinavText").value = "";
  document.getElementById("sinavDate").value = "";
  document.getElementById("dayText").value = "";

  setTimeout(() => {
    const item = document.querySelector('[data-id="' + updatedId + '"]');
    if(item){
      document.querySelectorAll(".item").forEach((entry) => entry.classList.remove("active"));
      item.classList.add("active");
      item.scrollIntoView({ behavior: "smooth", block: "center" });
    }
  }, 60);

  document.querySelectorAll("#lessonScreen button").forEach((button) => {
    button.textContent = "Kaydet";
  });
  document.querySelectorAll("#dayScreen button").forEach((button) => {
    button.textContent = "Kaydet";
  });
}

let planDataGlobal = {};

// Öğretmen: planPath Firebase'den çekilir ve swipe kartı gösterilir
async function loadPlanFromFirebase(){
  const appData = AppShell.loadAppData() || {};
  const lessons = appData.lessons || [];
  const params = new URLSearchParams(location.search);
  const lessonParam = params.get("lesson") || "";

  const lessonParamNorm = lessonParam.trim().toLowerCase();
  let lessonObj = lessons.find(l =>
    l.name && l.name.trim().toLowerCase() === lessonParamNorm
  );
  if(!lessonObj && lessonParam.includes(" - ")){
    const lessonNameOnly = lessonParam.split(" - ").slice(1).join(" - ").trim().toLowerCase();
    lessonObj = lessons.find(l =>
      l.name && l.name.trim().toLowerCase() === lessonNameOnly
    );
  }

  let planPath = lessonObj?.planPath || null;

  if(!planPath){
    const dayParam = params.get("day") || "";
    if(dayParam){
      const weeklyGrid = appData.weeklyGrid || {};
      const dayGrid = weeklyGrid[dayParam] || {};
      const totalSlots = appData.weeklySlots || 8;
      const lessonTrimmed = lessonParam.trim();
      for(let slot = 1; slot <= totalSlots; slot++){
        const cell = dayGrid[slot];
        if(cell && cell.lesson && cell.lesson.trim() === lessonTrimmed && cell.planPath){
          planPath = cell.planPath;
          break;
        }
      }
    }
  }

  if(!planPath){
    renderSwipe([]);
    return;
  }

  try{
    const { getDatabase, ref, get } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js");
    const { app } = await import("./assets/js/firebase.js");
    const db = getDatabase(app);
    const snapshot = await get(ref(db, "yillik-planlar/" + planPath));

    if(!snapshot.exists()){
      renderSwipe([]);
      return;
    }

    const val = snapshot.val();
    let planArr;
    if(val && val.plan){
      planArr = Array.isArray(val.plan) ? val.plan : Object.values(val.plan);
    }else{
      planArr = Array.isArray(val) ? val : Object.values(val);
    }
    planDataGlobal = planArr;
    renderSwipe(planArr);
  }catch(err){
    console.error("Plan yükleme hatası:", err);
    renderSwipe([]);
  }
}

loadPlanFromFirebase();

function formatFieldLabel(key){
  const labels = {
    unite:               "Ünite",
    unite_tema:          "Ünite / Tema",
    konu:                "Konu",
    konu_icerik_cercevesi: "Konu / İçerik Çerçevesi",
    kazanim:             "Kazanım",
    kazanim_aciklamasi:  "Kazanım Açıklaması",
    ogrenme_ciktilari:   "Öğrenme Çıktıları",
    surec_bilesenleri:   "Süreç Bileşenleri",
    aciklama:            "Açıklama",
  };
  if(labels[key]) return labels[key];
  return key.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
}

function renderSwipe(data){
  const wrap = document.getElementById("planWrap");
  if(!wrap) return;
  wrap.innerHTML = "";

  const FIELD_ORDER = [
    "unite", "unite_tema", "konu", "konu_icerik_cercevesi",
    "kazanim", "kazanim_aciklamasi", "ogrenme_ciktilari",
    "surec_bilesenleri", "aciklama",
  ];

  const filtered = data.filter(item =>
    item.belirli_gun_ve_haftalar !== "BELİRLİ GÜN VE HAFTALAR"
  );

  filtered.forEach(item => {
    let card;

    if(item.tip === "ozel"){
      // Tatil / özel hafta kartı — sade, tatil etiketi göster
      const tatilMetin = item.hafta || item.aciklama || "";
      const m = tatilMetin.toLocaleLowerCase("tr");

      // Sosyal etkinlik ve okul temelli planlama tatil değil — normal kart göster
      if(m.includes("sosyal etkinlik") || m.includes("okul temelli")){
        const knownKeys = FIELD_ORDER.filter(k => k in item);
        const unknownKeys = Object.keys(item).filter(k => k !== "hafta" && k !== "tip" && !FIELD_ORDER.includes(k));
        const orderedKeys = [...knownKeys, ...unknownKeys];
        const bodyHtml = orderedKeys.length
          ? orderedKeys.map(key =>
              `<span class="spLabel">${formatFieldLabel(key)}</span>` +
              `<span class="spValue">${item[key] || "-"}</span>`
            ).join("")
          : `<span class="spValue" style="opacity:.6">${tatilMetin}</span>`;
        wrap.innerHTML += `
          <div class="spCard">
            <div class="spHeader">${item.hafta || ""}</div>
            <div class="spBody">${bodyHtml}</div>
          </div>`;
        return;
      }

      // Tatil türüne göre etiket belirle
      let tatilEtiket = "Tatil";
      if(m.includes("yarıyıl") || m.includes("yari yil")) tatilEtiket = "Yarıyıl Tatili";
      else if(m.includes("1. dönem") || m.includes("1. ara")) tatilEtiket = "1. Ara Tatil";
      else if(m.includes("2. dönem") || m.includes("2. ara")) tatilEtiket = "2. Ara Tatil";
      else if(m.includes("ara tatil")) tatilEtiket = "Ara Tatil";

      // Tarih aralığını hafta metninden çıkar
      const tarihMatch = tatilMetin.match(/(\d[\d\s\-–A-Za-zÇçĞğİıÖöŞşÜü]+(?:Kasım|Ocak|Şubat|Mart|Nisan|Mayıs|Haziran|Temmuz|Ağustos|Eylül|Ekim|Kasım|Aralık)\s*\d{0,4})/i);
      const tarihAraligi = tarihMatch ? tarihMatch[0].trim() : "";

      card = `
        <div class="spCard spCard--tatil">
          <div class="spHeader spHeader--tatil">${tatilEtiket}</div>
          <div class="spBody spBody--tatil">
            ${tarihAraligi ? `<span class="tatilTarih">${tarihAraligi}</span>` : ""}
          </div>
        </div>
      `;
    } else {
      // Normal ders kartı
      const knownKeys = FIELD_ORDER.filter(k => k in item);
      const unknownKeys = Object.keys(item).filter(k => k !== "hafta" && k !== "tip" && !FIELD_ORDER.includes(k));
      const orderedKeys = [...knownKeys, ...unknownKeys];

      const bodyHtml = orderedKeys
        .map(key =>
          `<span class="spLabel">${formatFieldLabel(key)}</span>` +
          `<span class="spValue">${item[key] || "-"}</span>`
        ).join("");

      card = `
        <div class="spCard">
          <div class="spHeader">${item.hafta || ""}</div>
          <div class="spBody">${bodyHtml}</div>
        </div>
      `;
    }

    wrap.innerHTML += card;
  });

  const dotsEl = document.getElementById("swipeDots");
  const planSwipe = document.querySelector(".planSwipe");
  if(dotsEl && filtered.length > 1){
    dotsEl.innerHTML = filtered.map((_, i) =>
      `<div class="swipeDot${i === 0 ? " active" : ""}" data-i="${i}"></div>`
    ).join("");
    if(planSwipe){
      planSwipe.addEventListener("scroll", function(){
        const cards = wrap.querySelectorAll(".spCard");
        const cw = cards[0] ? cards[0].offsetWidth : planSwipe.offsetWidth;
        const idx = Math.round(planSwipe.scrollLeft / cw);
        dotsEl.querySelectorAll(".swipeDot").forEach((d, i) => {
          d.classList.toggle("active", i === idx);
        });
      }, { passive: true });
    }
  }

  scrollToCurrentWeek(filtered);
}

function scrollToCurrentWeek(data){
  const planSwipe = document.querySelector(".planSwipe");
  const wrap = document.getElementById("planWrap");
  if(!planSwipe || !wrap) return;

  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const sepYear = today.getMonth() >= 8 ? today.getFullYear() : today.getFullYear() - 1;
  const months = {
    "ocak": 1, "şubat": 2, "mart": 3, "nisan": 4, "mayıs": 5, "haziran": 6,
    "temmuz": 7, "ağustos": 8, "eylül": 9, "ekim": 10, "kasım": 11, "aralık": 12
  };

  function yearFor(monthNum){ return monthNum >= 9 ? sepYear : sepYear + 1; }

  let currentIdx = 0;
  let found = false;

  data.forEach((item, i) => {
    const hafta = (item.hafta || "").toLowerCase();
    let weekStart, weekEnd;

    // "27 Nisan - 1 Mayıs" — ay değişen, her iki ay açık
    const cross = hafta.match(/(\d+)\s+([a-zçğışöü]+)\s*[-–]\s*(\d+)\s+([a-zçğışöü]+)/);
    if(cross){
      const sm = months[cross[2]], em = months[cross[4]];
      if(!sm || !em) return;
      weekStart = new Date(yearFor(sm), sm - 1, parseInt(cross[1]));
      weekEnd   = new Date(yearFor(em), em - 1, parseInt(cross[3]));
    } else {
      // "13-17 Nisan" veya "27-1 Mayıs" (yalnızca bitiş ayı yazılı)
      const same = hafta.match(/(\d+)[^-\d]*-\s*(\d+)\s*([a-zçğışöü]+)/);
      if(!same) return;
      const em = months[same[3]];
      if(!em) return;
      const startDay = parseInt(same[1]);
      const endDay   = parseInt(same[2]);
      if(startDay > endDay){
        // Başlangıç günü bitiş gününden büyük → bir önceki ay
        const sm = em === 1 ? 12 : em - 1;
        weekStart = new Date(yearFor(sm), sm - 1, startDay);
      } else {
        weekStart = new Date(yearFor(em), em - 1, startDay);
      }
      weekEnd = new Date(yearFor(em), em - 1, endDay);
    }

    weekStart.setHours(0, 0, 0, 0);
    weekEnd.setHours(23, 59, 59, 999);

    if(today >= weekStart && today <= weekEnd){
      currentIdx = i;
      found = true;
    }else if(!found && today > weekEnd){
      currentIdx = i;
    }
  });

  const dotsEl = document.getElementById("swipeDots");
  if(dotsEl){
    dotsEl.querySelectorAll(".swipeDot").forEach((d, i) => {
      d.classList.toggle("active", i === currentIdx);
    });
  }

  requestAnimationFrame(() => {
    const cards = wrap.querySelectorAll(".spCard");
    const card = cards[currentIdx];
    if(!card) return;
    // scroll-snap-align:center için: kartın merkezi = konteyner merkezi
    const containerLeft = planSwipe.getBoundingClientRect().left;
    const cardRect = card.getBoundingClientRect();
    const cardScrollLeft = planSwipe.scrollLeft + cardRect.left - containerLeft;
    planSwipe.scrollLeft = cardScrollLeft - (planSwipe.offsetWidth - card.offsetWidth) / 2;
  });
}

function render(){
  const dataset = data() || [];
  const currentLesson = new URLSearchParams(location.search).get("lesson");

  ["not", "odev", "sinav", "day"].forEach((type) => {
    const list = document.getElementById(type + "List");
    if(!list) return;

    list.innerHTML = "";

    dataset
      .filter((entry) =>
        entry.type === type &&
        (type !== "day" || entry.dayName === currentDay) &&
        (type === "day" || entry.lesson === currentLesson)
      )
      .forEach((entry) => {
        const div = document.createElement("div");
        div.className = "item";
        div.dataset.id = entry.id;

        let text = entry.text;
        if(entry.type === "sinav" && entry.date){
          text = entry.date + " - " + entry.text;
        }

        div.innerHTML = [
          '<div class="item-text">' + text + "</div>",
          '<div class="icons">',
          '<span class="cardIcon editIcon" onclick="event.stopPropagation(); edit(' + entry.id + ')"></span>',
          '<span class="cardIcon deleteIcon" onclick="event.stopPropagation(); del(this,' + entry.id + ')"></span>',
          "</div>",
          "</div>"
        ].join("");

        list.appendChild(div);
      });
  });

  updateDots();
}

function updateDots(){
  ["not", "odev", "sinav"].forEach(function(type){
    const list = document.getElementById(type + "List");
    const dot = document.getElementById(type + "Dot");
    if(!dot) return;
    dot.classList.toggle("hasDot", !!(list && list.children.length > 0));
  });
}

function renderAll(){
  const dataset = data();
  const box = document.getElementById("allNotes");
  box.innerHTML = "";

  const dayNotes = dataset.filter((entry) => entry.type === "day");
  if(dayNotes.length){
    const dayCard = document.createElement("div");
    dayCard.className = "card";
    dayCard.innerHTML = [
      '<div class="card-head day-head">Gün Notları<span class="arrow">&#9662;</span></div>',
      '<div class="accordion day-acc"></div>'
    ].join("");
    box.appendChild(dayCard);

    const acc = dayCard.querySelector(".day-acc");
    acc.innerHTML = dayNotes.map((entry) => [
      '<div class="item" data-id="' + entry.id + '">',
      '<div class="item-text day-note-text"><span class="day-note-badge">' + (entry.dayName || entry.day) + '</span><span class="day-note-content">' + entry.text + "</span></div>",
      '<div class="icons">',
      '<span class="cardIcon editIcon" onclick="event.stopPropagation(); edit(' + entry.id + ')"></span>',
      '<span class="cardIcon deleteIcon" onclick="event.stopPropagation(); del(this,' + entry.id + ')"></span>',
      "</div>",
      "</div>"
    ].join("")).join("");
  }

  const lessonGroups = {};
  dataset.forEach((entry) => {
    if(entry.type === "day") return;
    if(!lessonGroups[entry.lesson]){
      lessonGroups[entry.lesson] = { not: [], odev: [], sinav: [] };
    }
    lessonGroups[entry.lesson][entry.type].push(entry);
  });

  Object.keys(lessonGroups).forEach((lessonKey) => {
    const lessonCard = document.createElement("div");
    lessonCard.className = "card";

    const parts = lessonKey.split(" - ");
    const cls = parts[1] ? parts[0] : "";
    const les = parts[1] ? parts[1] : parts[0];

    // Öğretmen: "9A - Matematik" formatında tam ad gösterilir
    lessonCard.innerHTML = [
      '<div class="card-head lesson-head">',
      parts.length > 1
        ? '<span class="cls">' + cls + '</span> - <span class="les">' + les + "</span>"
        : '<span class="les">' + les + "</span>",
      '<span class="arrow">&#9662;</span>',
      "</div>",
      '<div class="accordion lesson-acc"></div>'
    ].join("");

    box.appendChild(lessonCard);
    const acc = lessonCard.querySelector(".lesson-acc");

    ["not", "odev", "sinav"].forEach((type) => {
      const entries = lessonGroups[lessonKey][type];
      if(!entries.length) return;

      const subCard = document.createElement("div");
      subCard.className = "card";
      let html = '<div class="badge ' + type + '">' + type.toUpperCase() + "</div>";

      entries.forEach((entry) => {
        let text = entry.text;
        if(entry.type === "sinav" && entry.date){
          text = entry.date + " - " + entry.text;
        }

        html += [
          '<div class="item">',
          '<div class="item-text">' + text + "</div>",
          '<div class="icons">',
          '<span class="cardIcon editIcon" onclick="event.stopPropagation(); edit(' + entry.id + ')"></span>',
          '<span class="cardIcon deleteIcon" onclick="event.stopPropagation(); del(this,' + entry.id + ')"></span>',
          "</div>",
          "</div>"
        ].join("");
      });

      subCard.innerHTML = html;
      acc.appendChild(subCard);
    });
  });

  document.querySelectorAll("#allNotes .item").forEach((div) => {
    div.addEventListener("click", function(){
      document.querySelectorAll("#allNotes .item").forEach((item) => item.classList.remove("active"));
      div.classList.add("active");
    });
  });
}

let timers = {};

function openCard(type){
  const card = document.querySelector('#lessonScreen .card[data-type="' + type + '"]');
  if(!card) return;
  card.classList.add("open");
  card.querySelector(".arrow")?.classList.add("open");
  const button = card.querySelector("button");
  if(button) button.textContent = "Güncelle";
}

function openDayCard(){
  const card = document.querySelector("#dayScreen .card");
  if(!card) return;
  card.classList.add("open");
  card.querySelector(".arrow")?.classList.add("open");
  const button = card.querySelector("button");
  if(button) button.textContent = "Güncelle";
}

function edit(id){
  editFromList = true;
  lastEditType = null;

  document.querySelectorAll("#lessonScreen .card").forEach((card) => {
    card.classList.remove("open");
    card.querySelector(".arrow")?.classList.remove("open");
  });

  const dataset = data();
  const note = dataset.find((entry) => entry.id === id);
  if(!note) return;
  if(isRestrictedAccess(note.sourceDay || note.dayName)){
    showRestrictedPrompt();
    return;
  }

  editId = id;

  if(note.type === "day"){
    lastEditType = "day";
    currentDay = note.dayName;
    history.replaceState(null, "", "?lesson=" + encodeURIComponent(note.lesson));
    showScreen("dayScreen");
    document.getElementById("dayTitle").textContent = note.dayName || note.day;
    document.getElementById("dayText").value = note.text;
    requestAnimationFrame(openDayCard);
  }

  if(note.type === "not"){
    lastEditType = "not";
    history.replaceState(null, "", "?lesson=" + encodeURIComponent(note.lesson));
    showScreen("lessonScreen");
    setLessonTitle(note.lesson);
    document.getElementById("notText").value = note.text;
    render();
    loadPlanFromFirebase();
    requestAnimationFrame(() => openCard("not"));
  }

  if(note.type === "odev"){
    lastEditType = "odev";
    history.replaceState(null, "", "?lesson=" + encodeURIComponent(note.lesson));
    showScreen("lessonScreen");
    setLessonTitle(note.lesson);
    document.getElementById("odevText").value = note.text;
    render();
    loadPlanFromFirebase();
    requestAnimationFrame(() => openCard("odev"));
  }

  if(note.type === "sinav"){
    lastEditType = "sinav";
    history.replaceState(null, "", "?lesson=" + encodeURIComponent(note.lesson));
    showScreen("lessonScreen");
    setLessonTitle(note.lesson);
    document.getElementById("sinavText").value = note.text;
    document.getElementById("sinavDate").value = note.date;
    render();
    loadPlanFromFirebase();
    requestAnimationFrame(() => openCard("sinav"));
  }
}

function del(element, id){
  const note = data().find((entry) => entry.id === id);
  if(note && isRestrictedAccess(note.sourceDay || note.dayName)){
    showRestrictedPrompt();
    return;
  }

  if(!element.classList.contains("confirm")){
    element.classList.add("confirm");
    timers[id] = setTimeout(() => {
      element.classList.remove("confirm");
    }, 3000);
    return;
  }

  const dataset = data().filter((entry) => entry.id !== id);
  saveData(dataset);
  render();
  renderAll();
}

render();
if(mode === "list"){
  renderAll();
}

applyAccessState();

if(accessLocked && mode !== "list"){
  showRestrictedPrompt();
}

document.addEventListener("click", function(event){
  const head = event.target.closest(".card-head");
  if(!head) return;
  if(accessLocked && head.closest("#lessonScreen, #dayScreen")){
    showRestrictedPrompt();
    return;
  }

  const card = head.parentElement;
  const arrow = head.querySelector(".arrow");
  const group = card.parentElement;

  group.querySelectorAll(":scope > .card").forEach((entry) => {
    if(entry !== card){
      entry.classList.remove("open");
      entry.querySelector(".arrow")?.classList.remove("open");
    }
  });

  card.classList.toggle("open");
  arrow?.classList.toggle("open");

  if(card.classList.contains("open")){
    setTimeout(() => {
      const nav = document.querySelector(".nav");
      const navHeight = nav ? nav.offsetHeight : 80;
      const rect = card.getBoundingClientRect();
      const bottomSpace = window.innerHeight - rect.bottom;
      if(bottomSpace < navHeight + 10){
        const scrollAmount = (navHeight + 20) - bottomSpace;
        window.scrollBy({ top: scrollAmount, behavior: "smooth" });
      }
    }, 200);
  }
});
</script>
