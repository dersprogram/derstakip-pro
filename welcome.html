<!doctype html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"/>
<title>Ders Takip - Hoş Geldiniz</title>
<link rel="icon" href="icons/icon-192.png"/>
<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/base.css">
<style>
/* welcome.html — kendi stilleri, nav yok */
body{
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
  padding-bottom: 40px;
  overflow-x: hidden;
}

.welcome-wrap{
  width: 100%;
  max-width: 380px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

/* Marka */
.brand{
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-size: 1.7rem;
  font-weight: 800;
  letter-spacing: .04em;
  margin-bottom: 6px;
}

.brand .orange{ color: var(--color-accent); }
.brand .white{ color: var(--text-secondary); }

.brand-icon{
  position: relative;
  width: .9em;
  height: .72em;
  margin-right: .2em;
  transform: translateY(.09em);
}

.brand-icon .line-1,
.brand-icon .line-2{
  position: absolute;
  left: 0;
  height: 2px;
  background: var(--text-secondary);
  border-radius: 2px;
}
.brand-icon .line-1{ top: 0; width: 100%; }
.brand-icon .line-2{ top: 7px; width: 66%; }
.brand-icon .line-3{
  position: absolute;
  top: 14px;
  left: 0;
  width: 5px;
  height: 5px;
  background: var(--color-accent);
  border-radius: 999px;
}

.tagline{
  font-size: .82rem;
  color: var(--text-muted);
  letter-spacing: .06em;
  margin-bottom: 40px;
  text-align: center;
}

/* Ana kart */
.card{
  width: 100%;
  background: linear-gradient(180deg, var(--color-panel-top), var(--color-panel-bottom));
  border: 1px solid var(--border-normal);
  box-shadow:
    inset 0 0 0 1px var(--border-thin),
    0 10px 26px rgba(0,0,0,.45);
  border-radius: 20px;
  padding: 28px 24px 24px;
}

.card-title{
  font-size: .72rem;
  font-weight: 800;
  letter-spacing: .12em;
  color: var(--text-muted);
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 20px;
}

/* Rol seçim butonları */
.role-grid{
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
}

.role-btn{
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 22px 12px;
  border-radius: 16px;
  border: 2px solid var(--border-normal);
  background: var(--bg-input);
  color: var(--text-secondary);
  font-weight: 700;
  font-size: .9rem;
  letter-spacing: .04em;
  cursor: pointer;
  transition: border-color .2s, background .2s, color .2s, box-shadow .2s, transform .15s;
  position: relative;
  overflow: hidden;
}

.role-btn:active{
  transform: scale(.97);
}

.role-btn .role-icon{
  font-family: "Material Symbols Rounded", sans-serif;
  font-size: 2.2rem;
  font-variation-settings: "FILL" 0, "wght" 300, "GRAD" 0, "opsz" 24;
  color: var(--text-muted);
  transition: color .2s, font-variation-settings .2s;
  line-height: 1;
}

.role-btn.selected{
  border-color: var(--color-accent);
  background: rgba(var(--color-accent-rgb), .10);
  color: var(--color-accent);
  box-shadow:
    0 0 0 1px rgba(var(--color-accent-rgb), .25),
    0 8px 20px rgba(var(--color-accent-rgb), .18);
}

.role-btn.selected .role-icon{
  color: var(--color-accent);
  font-variation-settings: "FILL" 1, "wght" 400, "GRAD" 0, "opsz" 24;
}

/* Devam butonu */
.go-btn{
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  background: var(--color-accent);
  color: #000;
  font-weight: 800;
  font-size: 1rem;
  letter-spacing: .06em;
  border: none;
  cursor: pointer;
  transition: opacity .2s, transform .15s, box-shadow .2s;
  box-shadow: 0 6px 20px rgba(var(--color-accent-rgb), .35);
  opacity: 0;
  pointer-events: none;
  transform: translateY(6px);
}

.go-btn.visible{
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0);
}

.go-btn:active{
  transform: scale(.98);
}

/* Alt bilgi */
.footer-note{
  margin-top: 20px;
  font-size: .74rem;
  color: var(--text-muted);
  text-align: center;
  line-height: 1.5;
  opacity: .7;
}

/* Animasyon */
@keyframes fadeUp{
  from{ opacity:0; transform:translateY(18px); }
  to{ opacity:1; transform:translateY(0); }
}

.welcome-wrap{ animation: fadeUp .45s ease both; }
</style>
</head>
<body>

<div class="welcome-wrap">
  <div class="brand">
    <div class="brand-icon">
      <div class="line-1"></div>
      <div class="line-2"></div>
      <div class="line-3"></div>
    </div>
    <span class="white">Ders</span>
    <span class="orange">Takip</span>
    <span style="font-size:.45em; font-weight:700; color:var(--color-accent); letter-spacing:.12em; align-self:flex-end; margin-bottom:.18em; margin-left:.1em; opacity:.85;">Pro</span>
  </div>
  <div class="tagline">Rolünü seç, başla</div>

  <div class="card">
    <div class="card-title">Nasıl kullanacaksın?</div>

    <div class="role-grid">
      <button class="role-btn" data-role="teacher" onclick="selectRole('teacher')">
        <span class="role-icon">co_present</span>
        Öğretmen
      </button>
      <button class="role-btn" data-role="student" onclick="selectRole('student')">
        <span class="role-icon">menu_book</span>
        Öğrenci
      </button>
    </div>

    <button class="go-btn" id="goBtn" onclick="proceed()">
      Devam Et →
    </button>
  </div>

  <div class="footer-note">
    Rolünü daha sonra ayarlar üzerinden sıfırlayabilirsin.<br>
    Sıfırlama tüm verileri temizler.
  </div>
</div>

<script>
// Tema token'larını yükle
(function(){
  const stored = localStorage.getItem("appTheme") || "dark";
  document.documentElement.dataset.theme = stored === "light" ? "light" : "dark";
})();

// Eğer rol zaten seçiliyse direkt yönlendir
(function(){
  try{
    const raw = localStorage.getItem("ayarlar");
    const data = raw ? JSON.parse(raw) : null;
    const role = data?.settings?.role;
    if(role === "teacher" || role === "student"){
      const suffix = role === "student" ? "-student" : "-teacher";
      window.location.replace("index" + suffix + ".html");
    }
  }catch(e){}
})();

let selectedRole = null;

function selectRole(role){
  selectedRole = role;

  document.querySelectorAll(".role-btn").forEach(function(btn){
    btn.classList.toggle("selected", btn.dataset.role === role);
  });

  const goBtn = document.getElementById("goBtn");
  goBtn.classList.add("visible");
}

function proceed(){
  if(!selectedRole) return;

  // Mevcut veriyi koru, sadece rolü yaz
  let appData = {};
  try{
    const raw = localStorage.getItem("ayarlar");
    appData = raw ? JSON.parse(raw) : {};
  }catch(e){}

  if(!appData.settings) appData.settings = {};
  appData.settings.role = selectedRole;

  // userType yoksa guest olarak başlat
  if(!appData.settings.userType) appData.settings.userType = "guest";

  localStorage.setItem("ayarlar", JSON.stringify(appData));

  const suffix = selectedRole === "student" ? "-student" : "-teacher";
  window.location.replace("index" + suffix + ".html");
}
</script>
</body>
</html>
